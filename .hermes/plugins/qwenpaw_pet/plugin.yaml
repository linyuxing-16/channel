name: qwenpaw-pet
label: Qwenpaw Pet
kind: platform
version: 1.0.0
description: >
  WebSocket gateway adapter for the Qwenpaw Pet desktop companion.
  Starts a WebSocket server that the qwenpaw_pet-app (tkinter desktop pet)
  connects to.  Users chat with the Hermes agent through the desktop pet
  window using the same JSON streaming protocol as the original channel.
author: Hermes Community
requires_env:
  - name: QWENPAW_PET_TOKEN
    description: "Bearer token for WebSocket authentication"
    prompt: "Qwenpaw Pet WebSocket token"
    password: true
optional_env:
  - name: QWENPAW_PET_HOST
    description: "WebSocket server listen address (default: 0.0.0.0)"
    prompt: "Listen address"
    password: false
  - name: QWENPAW_PET_PORT
    description: "WebSocket server port (default: 8765)"
    prompt: "Listen port"
    password: false
  - name: QWENPAW_PET_ALLOWED_USERS
    description: "Comma-separated client IDs allowed to talk to the agent"
    prompt: "Allowed client IDs (comma-separated)"
    password: false
  - name: QWENPAW_PET_ALLOW_ALL_USERS
    description: "Allow any client to talk to the agent (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: QWENPAW_PET_HOME_CHANNEL
    description: "Default client ID for cron / notification delivery"
    prompt: "Home channel (client ID for cron delivery)"
    password: false
